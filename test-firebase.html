<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Firebase</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  body{ font-family: monospace; background:#111; color:#eee; padding:16px; font-size:14px; line-height:1.6; }
  .ok{ color:#5ee6a8; }
  .err{ color:#e6685e; }
  .line{ margin-bottom:10px; white-space:pre-wrap; word-break:break-all; }
</style>
</head>
<body>
<h2>Test Firebase — Mascotto</h2>
<div id="log"></div>

<script>
const log = (msg, cls) => {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' ' + cls : '');
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
};

log('1. Initialisation…');

try {
  const firebaseConfig = {
    apiKey: "AIzaSyDYZ24YFOuL9s2TmgAyiEwCf1PtZeeSgTc",
    authDomain: "mascotto-a2afc.firebaseapp.com",
    projectId: "mascotto-a2afc",
    storageBucket: "mascotto-a2afc.firebasestorage.app",
    messagingSenderId: "467516847674",
    appId: "1:467516847674:web:f8ad795768ea6757d92703"
  };

  firebase.initializeApp(firebaseConfig);
  log('2. App Firebase initialisée — OK', 'ok');

  const auth = firebase.auth();
  const db = firebase.firestore();
  log('3. Auth et Firestore créés — OK', 'ok');

  log('4. Tentative de connexion anonyme…');
  auth.signInAnonymously()
    .then((cred) => {
      log('5. Connexion anonyme réussie — uid: ' + cred.user.uid, 'ok');

      log('6. Tentative d\'écriture Firestore…');
      return db.collection('_test').doc('ping').set({ t: Date.now() });
    })
    .then(() => {
      log('7. Écriture Firestore réussie — OK', 'ok');
      log('TOUT FONCTIONNE.', 'ok');
    })
    .catch((err) => {
      log('ÉCHEC à l\'étape 5, 6 ou 7 : ' + err.code + ' — ' + err.message, 'err');
    });

} catch (err) {
  log('ÉCHEC à l\'étape 2 ou 3 : ' + (err.code || '') + ' — ' + err.message, 'err');
}
</script>
</body>
</html>
